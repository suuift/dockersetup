satisfactory: |
  satisfactory:
    container_name: 'satisfactory-server'
    hostname: 'satisfactory-server'
    image: 'wolveix/satisfactory-server:latest'
    ports:
      - '8012:7777/tcp'
      - '8012:7777/udp'
      - '8888:8888/tcp'
    volumes:
      - $DOCKERDIR/appdata/satisfactory/config:/config
    environment:
      - MAXPLAYERS=10
      - PGID=1000
      - PUID=1000
      - STEAMBETA=true
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 8G
        reservations:
          memory: 4G

valheim: |
  valheim:
    image: lloesche/valheim-server:latest
    container_name: valheim
    <<: *common-keys-apps
    ports:
      - "2456-2457:2456-2457/udp"
    volumes:
      - $DOCKERDIR/appdata/valheim/config:/config
      - $DOCKERDIR/appdata/valheim/data:/opt/valheim
    environment:
      - SERVER_NAME=Valheim Server
      - WORLD_NAME=Bussh
      - SERVER_PASS=busting

enshrouded: |
  enshrouded:
    image: mornedhels/enshrouded-server:latest
    container_name: enshrouded
    hostname: enshrouded
    <<: *common-keys-apps
    stop_grace_period: 90s
    ports:
      - "15637:15637/udp"
    volumes:
      - $DOCKERDIR/appdata/enshrouded/data:/opt/enshrouded
    environment:
      - SERVER_NAME=Enshrouded Server
      - SERVER_PASSWORD=secret
      - UPDATE_CRON=*/30 * * * *
      - PUID=4711
      - PGID=4711

