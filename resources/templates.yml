# ##############################################################################
# CRITICAL: DO NOT AUTO-FORMAT THIS FILE WITH STANDARD YAML TOOLS (yq, prettier, etc.)
# This file uses a custom line-based block scalar format for multi-stack generation.
# Reformatting will break the custom parser in utils/yaml_parser.py.
# ##############################################################################
# Service Templates for dynamic generation
# -----------------------------------------------------

header: |
  networks:
    default:
      driver: bridge
    npm_proxy:
      external: true
    media-internal:
      external: true

  x-environment: &default-tz-puid-pgid
    TZ: $TZ
    PUID: $PUID
    PGID: $PGID

  x-logging: &default-logging
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  x-common-keys-core: &common-keys-core
    <<: *default-logging
    networks:
      - npm_proxy
    security_opt:
      - no-new-privileges:true
    restart: always

  x-common-keys-apps: &common-keys-apps
    <<: *default-logging
    networks:
      - npm_proxy
      - media-internal
    security_opt:
      - no-new-privileges:true
    restart: unless-stopped

  services:

# --- MINIMAL STACK ---
sonarr: |
  # PORT: 8989
  sonarr:
    image: lscr.io/linuxserver/sonarr:latest
    container_name: sonarr
    <<: *common-keys-apps
    volumes:
      - $DOCKERDIR/appdata/sonarr/config:/config
      - $DRIVEPOOL/tv:/tv
      - $DRIVEPOOL/anime:/anime
      - $DRIVEPOOL/downloads:/downloads
    ports:
      - 8989:8989
    environment:
      <<: *default-tz-puid-pgid

radarr: |
  radarr:
    image: lscr.io/linuxserver/radarr:latest
    container_name: radarr
    <<: *common-keys-apps
    volumes:
      - $DOCKERDIR/appdata/radarr/config:/config
      - $DRIVEPOOL/movies:/movies
      - $DRIVEPOOL/downloads:/downloads
    ports:
      - 7878:7878
    environment:
      <<: *default-tz-puid-pgid

lidarr: |
  lidarr:
    image: lscr.io/linuxserver/lidarr:nightly
    container_name: lidarr
    <<: *common-keys-apps
    volumes:
      - $DOCKERDIR/appdata/lidarr/config:/config
      - $DRIVEPOOL/music:/music
      - $DRIVEPOOL/downloads:/downloads
    ports:
      - 8686:8686
    environment:
      <<: *default-tz-puid-pgid

bazarr: |
  bazarr:
    image: lscr.io/linuxserver/bazarr:1.5.1
    container_name: bazarr
    <<: *common-keys-apps
    volumes:
      - $DOCKERDIR/appdata/bazarr/config:/config
      - $DRIVEPOOL/movies:/movies
      - $DRIVEPOOL/tv:/tv
    ports:
      - 6767:6767
    environment:
      <<: *default-tz-puid-pgid

prowlarr: |
  prowlarr:
    image: lscr.io/linuxserver/prowlarr:latest
    container_name: prowlarr
    <<: *common-keys-apps
    volumes:
      - $DOCKERDIR/appdata/prowlarr/config:/config
    ports:
      - 9696:9696
    environment:
      <<: *default-tz-puid-pgid

flaresolverr: |
  flaresolverr:
    image: ghcr.io/flaresolverr/flaresolverr:latest
    container_name: flaresolverr
    <<: *common-keys-apps
    environment:
      - LOG_LEVEL=info
      - TZ=$TZ
    ports:
      - 8191:8191

qbittorrent: |
  qbittorrent:
    image: lscr.io/linuxserver/qbittorrent:latest
    container_name: qbit
    <<: *common-keys-apps
    environment:
      - WEBUI_PORT=8081
    volumes:
      - $DOCKERDIR/appdata/qbit/config:/config
      - $DRIVEPOOL/downloads:/downloads
    ports:
      - 8081:8081
      - 6881:6881
      - 6881:6881/udp

sabnzbd: |
  sabnzbd:
    image: lscr.io/linuxserver/sabnzbd:latest
    container_name: sabnzbd
    <<: *common-keys-apps
    volumes:
      - $DOCKERDIR/appdata/sabnzbd/config:/config
      - $DRIVEPOOL/downloads:/downloads
      - $DRIVEPOOL/downloads/incomplete:/incompletedownloads
    ports:
      - 8080:8080
    environment:
      <<: *default-tz-puid-pgid

qbittorrent-vpn: |
  qbittorrent-vpn:
    image: binhex/arch-qbittorrentvpn:latest
    container_name: qbit-vpn
    <<: *common-keys-apps
    privileged: true
    sysctls:
      - net.ipv4.conf.all.src_valid_mark=1
    ports:
      - 8081:8081
      - 6881:6881
      - 6881:6881/udp
    volumes:
      - $DOCKERDIR/appdata/qbit-vpn/config:/config
      - $DRIVEPOOL/downloads:/downloads
    environment:
      - VPN_ENABLED=yes
      - VPN_USER=$VPN_USER
      - VPN_PASS=$VPN_PASS
      - VPN_PROV=$VPN_PROV
      - VPN_CLIENT=$VPN_CLIENT
      - STRICT_PORT_FORWARD=yes
      - ENABLE_PRAR=yes
      - LAN_NETWORK=$LAN_NETWORK
      - NAME_SERVERS=1.1.1.1,1.0.0.1
      - PHP_TZ=$TZ
      - PUID=$PUID
      - PGID=$PGID

seerr: |
  seerr:
    image: ghcr.io/seerr-team/seerr:latest
    container_name: seerr
    <<: *common-keys-apps
    volumes:
      - $DOCKERDIR/appdata/seerr/config:/config
    ports:
      - 5055:5055
    environment:
      <<: *default-tz-puid-pgid

recyclarr: |
  recyclarr:
    image: ghcr.io/recyclarr/recyclarr:latest
    container_name: recyclarr
    user: $PUID:$PGID
    volumes:
      - $DOCKERDIR/appdata/recyclarr/config:/config
    environment:
      - TZ=$TZ
    restart: unless-stopped

plex: |
  plex:
    image: lscr.io/linuxserver/plex:latest
    container_name: plex
    <<: *common-keys-core
    environment:
      - VERSION=docker
      - PLEX_CLAIM=$PLEX_CLAIM
      - TZ=$TZ
      - PUID=$PUID
      - PGID=$PGID
      - NVIDIA_VISIBLE_DEVICES=all
    ports:
      - 32400:32400
      - 1900:1900/udp
      - 3005:3005
      - 8324:8324/tcp
      - 32410:32410/udp
      - 32412:32412/udp
      - 32413:32413/udp
      - 32414:32414/udp
      - 32469:32469
    volumes:
      - $DOCKERDIR/appdata/plex/config:/config
      - $DRIVEPOOL/tv:/tv
      - $DRIVEPOOL/movies:/movies
      - $DRIVEPOOL/anime:/anime
      - $DRIVEPOOL/music:/music
      - $DRIVEPOOL/audiobooks:/audiobooks

jellyfin: |
  jellyfin:
    image: lscr.io/linuxserver/jellyfin:latest
    container_name: jellyfin
    <<: *common-keys-core
    environment:
      <<: *default-tz-puid-pgid
    ports:
      - 8096:8096
    volumes:
      - $DOCKERDIR/appdata/jellyfin/config:/config
      - $DRIVEPOOL/tv:/tv
      - $DRIVEPOOL/movies:/movies
      - $DRIVEPOOL/anime:/anime
      - $DRIVEPOOL/music:/music
      - $DRIVEPOOL/audiobooks:/audiobooks
      - $DRIVEPOOL/books:/books

watchtower: |
  watchtower:
    image: containrrr/watchtower:latest
    container_name: watchtower
    <<: *common-keys-core
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      DOCKER_API_VERSION: 1.44
      <<: *default-tz-puid-pgid

docker-prune: |
  docker-prune:
    image: softonic/docker-system-prune:latest
    container_name: docker-prune
    <<: *common-keys-core
    entrypoint: ["/bin/sh", "-c", "while true; do /run.sh --volumes --all; sleep 86400; done"]
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock

homepage: |
  homepage:
    image: ghcr.io/gethomepage/homepage:latest
    container_name: homepage
    <<: *common-keys-apps
    ports:
      - 3000:3000
    volumes:
      - $DOCKERDIR/appdata/homepage/config:/app/config
      - /var/run/docker.sock:/var/run/docker.sock
      - $USERDIR:/c
      - $DRIVEPOOL:/h
    environment:
      <<: *default-tz-puid-pgid

# --- ADVANCED ADD-ONS ---
portainer: |
  portainer:
    container_name: portainer
    image: portainer/portainer-ce:latest
    command: -H unix:///var/run/docker.sock
    ports:
      - 9443:9443
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - $DOCKERDIR/appdata/portainer/data:/data
    <<: *common-keys-core
    environment:
      <<: *default-tz-puid-pgid

dockge: |
  dockge:
    image: louislam/dockge:1
    container_name: dockge
    restart: unless-stopped
    ports:
      - 5001:5001
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - $DOCKERDIR/appdata/dockge/data:/app/data
      - $DOCKERDIR/stacks:/app/stacks
    environment:
      - DOCKGE_STACKS_DIR=$DOCKERDIR/stacks

tautulli: |
  tautulli:
    image: lscr.io/linuxserver/tautulli:latest
    container_name: tautulli
    <<: *common-keys-apps
    volumes:
      - $DOCKERDIR/appdata/tautulli/config:/config
    ports:
      - 8181:8181
    environment:
      <<: *default-tz-puid-pgid

uptime: |
  uptime:
    image: louislam/uptime-kuma:1
    container_name: uptime
    <<: *common-keys-apps
    volumes:
      - $DOCKERDIR/appdata/uptime/data:/app/data
    ports:
      - 3001:3001

npm plus (+goaccess): |
  npm-plus:
    <<: *common-keys-core
    container_name: nginx-proxy-manager-plus
    image: 'zoeyvid/nginx-proxy-manager-plus:latest'
    networks:
      npm_proxy:
        ipv4_address: 192.168.89.254
    ports:
      - '80:80'
      - '443:443'
      - '81:81'
    volumes:
      - $DOCKERDIR/appdata/npm/config:/config 
      - $DOCKERDIR/appdata/npm/letsencrypt:/etc/letsencrypt
      - $DOCKERDIR/appdata/npm/data:/data
    environment:
      - DISABLE_IPV6=true
      - CROWDSEC_ENABLED=$CROWDSEC_ENABLED
      - CROWDSEC_LAPI_URL=http://crowdsec:8080
      - CROWDSEC_LAPI_KEY=$CROWDSEC_API_KEY

  goaccess:
    <<: *common-keys-apps
    image: xavierh/goaccess-for-nginxproxymanager:latest
    container_name: goaccess
    ports:
      - 7880:7880
    environment:
      - PUID=$PUID
      - PGID=$PGID
      - TZ=$TZ
    volumes:
      - $DOCKERDIR/appdata/npm/logs:/opt/log
      - $DOCKERDIR/appdata/goaccess/config:/config

tailscale: |
  tailscale:
    image: tailscale/tailscale:latest
    container_name: tailscale
    hostname: tailscale
    environment:
      - TS_AUTHKEY=$TS_AUTHKEY
      - TS_STATE_DIR=/var/lib/tailscale
    volumes:
      - $DOCKERDIR/appdata/tailscale/data:/var/lib/tailscale
      - /dev/net/tun:/dev/net/tun
    cap_add:
      - NET_ADMIN
      - NET_RAW
    restart: unless-stopped

cloudflare-ddns: |
  cloudflare-ddns:
    image: favonia/cloudflare-ddns:latest
    container_name: cloudflare-ddns
    <<: *common-keys-core
    environment:
      - CF_API_TOKEN=$CF_API_TOKEN
      - DOMAINS=$CF_DOMAINS
      - PROXIED=true
    restart: unless-stopped

crowdsec: |
  crowdsec:
    image: crowdsecurity/crowdsec:latest
    container_name: crowdsec
    <<: *common-keys-core
    environment:
      - GID=$PGID
      - COLLECTIONS=crowdsecurity/nginx-proxy-manager crowdsecurity/base-os crowdsecurity/sshd
    volumes:
      - $DOCKERDIR/appdata/crowdsec/config:/etc/crowdsec
      - $DOCKERDIR/appdata/crowdsec/data:/var/lib/crowdsec
      - $DOCKERDIR/appdata/npm/logs:/var/log/npm:ro
      - /var/log:/var/log:ro
    restart: unless-stopped

mariadb (+adminer): |
  mariadb:
    image: lscr.io/linuxserver/mariadb:latest
    container_name: mariadb
    <<: *common-keys-core
    networks:
      - media-internal
    environment:
      - MYSQL_ROOT_PASSWORD=$MYSQL_ROOT_PASSWORD
      - MYSQL_DATABASE=mediadb
      - MYSQL_USER=$MYSQL_USER
      - MYSQL_PASSWORD=$MYSQL_PASSWORD
    volumes:
      - $DOCKERDIR/appdata/mariadb/config:/config
    ports:
      - 3306:3306
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  adminer:
    image: adminer:latest
    container_name: adminer
    <<: *common-keys-apps
    ports:
      - 8082:8080

postgresql (+cloudbeaver): |
  postgresql:
    image: lscr.io/linuxserver/postgresql:latest
    container_name: postgres
    <<: *common-keys-core
    networks:
      - media-internal
    environment:
      - POSTGRES_USER=mediauser
      - POSTGRES_PASSWORD=$DB_PASS
      - POSTGRES_DB=mediadb
    volumes:
      - $DOCKERDIR/appdata/postgres/data:/var/lib/postgresql/data
    ports:
      - 5432:5432
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mediauser -d mediadb"]
      interval: 10s
      timeout: 5s
      retries: 5

cloudbeaver: |
  cloudbeaver:
    image: dbeaver/cloudbeaver:latest
    container_name: cloudbeaver
    <<: *common-keys-apps
    ports:
      - 8978:8978
    volumes:
      - $DOCKERDIR/appdata/cloudbeaver/data:/opt/cloudbeaver/workspace

mongodb (+mongo-express): |
  mongodb:
    image: mongo:latest
    container_name: mongodb
    <<: *common-keys-core
    networks:
      - media-internal
    environment:
      - MONGO_INITDB_ROOT_USERNAME=admin
      - MONGO_INITDB_ROOT_PASSWORD=$MONGO_PASS
    volumes:
      - $DOCKERDIR/appdata/mongodb/data:/data/db
    ports:
      - 27017:27017

mongo-express: |
  mongo-express:
    image: mongo-express:latest
    container_name: mongo-express
    <<: *common-keys-apps
    environment:
      - ME_CONFIG_MONGODB_ADMINUSERNAME=admin
      - ME_CONFIG_MONGODB_ADMINPASSWORD=$MONGO_PASS
      - ME_CONFIG_MONGODB_SERVER=mongodb
      - ME_CONFIG_BASICAUTH_USERNAME=$HTTP_USERNAME
      - ME_CONFIG_BASICAUTH_PASSWORD=$HTTP_PASSWORD
    ports:
      - 8081:8081

kasm: |
  kasm:
    image: lscr.io/linuxserver/kasm:latest
    container_name: kasm
    <<: *common-keys-core
    privileged: true
    environment:
      KASM_PORT: 6901
      <<: *default-tz-puid-pgid
    volumes:
      - $DOCKERDIR/appdata/kasm/config:/config
      - /var/run/docker.sock:/var/run/docker.sock
    ports:
      - 6901:6901
      - 4430:443

cloudcmd: |
  cloudcmd:
    image: coderaiser/cloudcmd:latest
    container_name: cloudcmd
    <<: *common-keys-apps
    environment:
      - CLOUDCMD_AUTHENTICATION=true
      - CLOUDCMD_USERNAME=$HTTP_USERNAME
      - CLOUDCMD_PASSWORD=$HTTP_PASSWORD
    volumes:
      - $DRIVEPOOL:/media_pool
      - $DOCKERDIR:/docker_data
{{DYNAMIC_MOUNTS}}
    ports:
      - 8000:8000

filebrowser: |
  filebrowser:
    image: filebrowser/filebrowser:latest
    container_name: filebrowser
    <<: *common-keys-apps
    environment:
      - PUID=$PUID
      - PGID=$PGID
      - TZ=$TZ
    volumes:
      - $DOCKERDIR/appdata/filebrowser/config/filebrowser.db:/database/filebrowser.db
      - $DOCKERDIR/appdata/filebrowser/config/settings.json:/config/settings.json
      - $DRIVEPOOL:/srv/Media
      - $DOCKERDIR:/srv/DockerData
{{DYNAMIC_MOUNTS}}
    ports:
      - 8085:80

syncthing: |
  syncthing:
    image: lscr.io/linuxserver/syncthing:latest
    container_name: syncthing
    <<: *common-keys-apps
    environment:
      <<: *default-tz-puid-pgid
    volumes:
      - $DOCKERDIR/appdata/syncthing/config:/config
      - $DRIVEPOOL/music:/data
    ports:
      - 8384:8384
      - 22000:22000/tcp
      - 22000:22000/udp
      - 21027:21027/udp

vaultwarden: |
  vaultwarden:
    image: vaultwarden/server:latest
    container_name: vaultwarden
    <<: *common-keys-apps
    environment:
      - SIGNUPS_ALLOWED=false
      - TZ=$TZ
    volumes:
      - $DOCKERDIR/appdata/vaultwarden/data:/data
    ports:
      - 8083:80

navidrome: |
  navidrome:
    image: deluan/navidrome:latest
    container_name: navidrome
    <<: *common-keys-apps
    environment:
      - ND_SCANSCHEDULE=1h
      - ND_LOGLEVEL=info
      - ND_BASEURL=""
      - TZ=$TZ
    volumes:
      - $DOCKERDIR/appdata/navidrome/data:/data
      - $DRIVEPOOL/music:/music:ro
    ports:
      - 4533:4533

slskd: |
  slskd:
    image: slskd/slskd:latest
    container_name: slskd
    <<: *common-keys-apps
    environment:
      - SLSKD_PUID=$PUID
      - SLSKD_PGID=$PGID
      - SLSKD_TZ=$TZ
      - SLSKD_SLSK_LISTEN_PORT=50300
    volumes:
      - $DOCKERDIR/appdata/slskd/config:/app/config
      - $DRIVEPOOL/music:/app/music
      - $DRIVEPOOL/downloads/slskd:/app/downloads
    ports:
      - 50300:50300
      - 5030:5030

mylar: |
  mylar:
    image: lscr.io/linuxserver/mylar3:latest
    container_name: mylar
    <<: *common-keys-apps
    environment:
      <<: *default-tz-puid-pgid
    volumes:
      - $DOCKERDIR/appdata/mylar/config:/config
      - $DRIVEPOOL/comics:/comics
      - $DRIVEPOOL/downloads:/downloads
    ports:
      - 8090:8090

readarr: |
  readarr:
    image: lscr.io/linuxserver/readarr:develop
    container_name: readarr
    <<: *common-keys-apps
    environment:
      <<: *default-tz-puid-pgid
    volumes:
      - $DOCKERDIR/appdata/readarr/config:/config
      - $DRIVEPOOL/books:/books
      - $DRIVEPOOL/audiobooks:/audiobooks
      - $DRIVEPOOL/downloads:/downloads
    ports:
      - 8787:8787

hkserver: |
  hkserver:
    image: hollowknight/hkmp:latest
    container_name: hkserver
    <<: *common-keys-apps
    ports:
      - 7777:7777/udp

kopia: |
  kopia:
    image: kopia/kopia:latest
    container_name: kopia
    <<: *common-keys-apps
    environment:
      <<: *default-tz-puid-pgid
      USER_UID: $PUID
      USER_GID: $PGID
    volumes:
      - $DOCKERDIR/appdata/kopia/config:/app/config
      - $DOCKERDIR/appdata/kopia/cache:/app/cache
      - $DOCKERDIR/appdata/kopia/logs:/app/logs
      - $DOCKERDIR/appdata:/source/appdata:ro
      - $DRIVEPOOL:/source/media:ro
    ports:
      - 51515:51515
    command: >
      server start
      --address 0.0.0.0:51515
      --server-username=$HTTP_USERNAME
      --server-password=$KOPIA_PASSWORD
      --config-file=/app/config/repository.config
      --log-dir=/app/logs
      --cache-directory=/app/cache

authelia: |
  authelia:
    image: authelia/authelia:latest
    container_name: authelia
    <<: *common-keys-core
    volumes:
      - $DOCKERDIR/appdata/authelia/config:/config
    ports:
      - 9091:9091

immich: |
  immich:
    image: ghcr.io/immich-app/immich-server:release
    container_name: immich
    <<: *common-keys-apps
    volumes:
      - $DOCKERDIR/appdata/immich/data:/config
      - $DRIVEPOOL/photos:/photos
    ports:
      - 2283:3001

audiobookshelf: |
  audiobookshelf:
    image: ghcr.io/advplyr/audiobookshelf:latest
    container_name: audiobookshelf
    <<: *common-keys-apps
    environment:
      - PUID=$PUID
      - PGID=$PGID
      - TZ=$TZ
    volumes:
      - $DOCKERDIR/appdata/audiobookshelf/config:/config
      - $DOCKERDIR/appdata/audiobookshelf/metadata:/metadata
      - $DRIVEPOOL/audiobooks:/audiobooks
      - $DRIVEPOOL/books:/books
      - $DRIVEPOOL/podcasts:/podcasts
    ports:
      - 13378:80

paperless: |
  paperless:
    image: ghcr.io/paperless-ngx/paperless-ngx:latest
    container_name: paperless
    <<: *common-keys-apps
    volumes:
      - $DOCKERDIR/appdata/paperless/data:/data
      - $DRIVEPOOL/documents:/documents
    ports:
      - 8010:8000

scrutiny: |
  scrutiny:
    image: ghcr.io/analogj/scrutiny:latest-omnibus
    container_name: scrutiny
    <<: *common-keys-apps
    cap_add:
      - SYS_RAWIO
      - SYS_ADMIN
    environment:
      - PUID=$PUID
      - PGID=$PGID
      - TZ=$TZ
    volumes:
      - /run/udev:/run/udev:ro
      - $DOCKERDIR/appdata/scrutiny/config:/opt/scrutiny/config
      - $DOCKERDIR/appdata/scrutiny/influxdb:/opt/scrutiny/influxdb
    ports:
      - 8086:8080

# --- GAMES ---
tmodloader: |
  tmodloader:
    image: 'jacobsmile/tmodloader1.4:latest'
    container_name: 'terraria'
    ports:
      - "7771:7777"
    expose:
      - "7771"
    <<: *common-keys-apps
